version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: finpilot
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  pgdata:
  chroma_data:
