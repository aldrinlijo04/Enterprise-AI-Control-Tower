<div class="launch-page">
  <div class="bg-grid"></div>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>

  <header class="launch-header">
    <img src="assets/air-products-logo.png" class="launch-logo" alt="Air Products" />
    <div class="header-pill">
      <span class="header-dot"></span>
      CONTROL TOWER LIVE
    </div>
  </header>

  <main class="launch-main">
    <p class="launch-kicker">Enterprise AI Control Tower</p>
    <h1 class="launch-title">Choose Your Workspace</h1>
    <p class="launch-subtitle">
      Jump directly into the workspace you need: multi-agent operations, AIR OS telemetry,
      or the FinPilot finance intelligence sidecar.
    </p>

    <section class="three-d-stage" aria-hidden="true">
      <div class="three-d-scene">
        <div class="holo-disc"></div>
        <div class="holo-ring ring-outer"></div>
        <div class="holo-ring ring-inner"></div>
        <div class="holo-ring ring-signal"></div>

        <div class="data-tower tower-a"></div>
        <div class="data-tower tower-b"></div>
        <div class="data-tower tower-c"></div>

        <div class="beam beam-a"></div>
        <div class="beam beam-b"></div>

        <div class="cube cube-a">
          <span class="face front"></span>
          <span class="face back"></span>
          <span class="face left"></span>
          <span class="face right"></span>
          <span class="face top"></span>
          <span class="face bottom"></span>
        </div>

        <div class="cube cube-b">
          <span class="face front"></span>
          <span class="face back"></span>
          <span class="face left"></span>
          <span class="face right"></span>
          <span class="face top"></span>
          <span class="face bottom"></span>
        </div>

        <div class="cube cube-c">
          <span class="face front"></span>
          <span class="face back"></span>
          <span class="face left"></span>
          <span class="face right"></span>
          <span class="face top"></span>
          <span class="face bottom"></span>
        </div>
      </div>
    </section>

    <section class="tile-grid" aria-label="Workspace launcher">
      <button class="launch-tile tile-workshop" type="button" (click)="openTile('agent-workshop')">
        <span class="tile-status">LIVE</span>
        <h2 class="tile-title">Agent Workshop</h2>
        <p class="tile-text">
          Open the collaborative agent workspace and continue in the chat orchestration view.
        </p>
        <span class="tile-cta">Open Workshop</span>
      </button>

      <button class="launch-tile tile-airos" type="button" (click)="openTile('air-os')">
        <span class="tile-status">LIVE</span>
        <h2 class="tile-title">AIR OS</h2>
        <p class="tile-text">
          Enter the operations dashboard for plant KPIs, maintenance health, and failure intelligence.
        </p>
        <span class="tile-cta">Open AIR OS</span>
      </button>

      <button class="launch-tile tile-finpilot" type="button" (click)="openTile('finpilot')">
        <span class="tile-status">SIDECAR READY</span>
        <h2 class="tile-title">FINPILOT</h2>
        <p class="tile-text">
          Launch the dedicated FinPilot sidecar app with workflow center, approvals, and finance agent routing.
        </p>
        <span class="tile-cta">Open FinPilot</span>
      </button>
    </section>
  </main>
</div>
