<div class="shell">
  <aside class="sidebar">
    <div class="brand">FinPilot AI</div>
    <div class="subtitle">Finance decision platform</div>

    <nav class="nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        class="nav-link"
      >
        {{ item.label }}
      </a>
    </nav>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
